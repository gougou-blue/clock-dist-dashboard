name: Clock Metrics Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"
  push:
    branches:
      - main

jobs:
  build-dashboard-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python
        run: python -m compileall core ingestion dashboard tests

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build dashboard payload
        run: python -m dashboard.main --output public/data/latest.json

      - name: Upload dashboard payload
        uses: actions/upload-artifact@v4
        with:
          name: clock-dashboard-data
          path: public/data/latest.json
